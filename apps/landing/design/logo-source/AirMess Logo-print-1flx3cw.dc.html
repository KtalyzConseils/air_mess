<!DOCTYPE html>
<html>
<head>
<style data-omelette-print-defaults>
@media print {
  @page { margin: 0; }
  body { padding: 0.5in; box-sizing: border-box; }
  h1, h2, h3, h4, h5, h6 { break-after: avoid; }
  figure, table, pre, blockquote, img, svg, tr, [class~="card" i] { break-inside: avoid; }
  img, svg { max-width: 100%; }
  p { orphans: 3; widows: 3; }
}
</style>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body{margin:0;background:#ECE9E3;}
    *{box-sizing:border-box;}
  </style>
</helmet>

<div style="min-height:100vh;background:#ECE9E3;padding:56px 40px;font-family:'Inter',sans-serif;display:flex;justify-content:center;">
  <div style="width:1180px;background:#ffffff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.10),0 18px 50px -28px rgba(0,0,0,.25);overflow:hidden;">

    <!-- Header -->
    <div style="padding:40px 56px 28px;border-bottom:1px solid #EEEBE5;display:flex;align-items:baseline;justify-content:space-between;">
      <div style="font-family:'Baloo 2';font-weight:700;font-size:22px;color:#1A1D1F;letter-spacing:.2px;">AirMess <span style="color:#9A958C;font-weight:600;">— planche vectorielle</span></div>
      <div style="font-size:13px;color:#9A958C;font-weight:500;">SVG · tracé vectoriel éditable</div>
    </div>

    <!-- Primary lockup -->
    <div style="padding:64px 56px 56px;border-bottom:1px solid #EEEBE5;">
      <div style="font-size:12px;font-weight:600;letter-spacing:1.5px;color:#B6B0A6;text-transform:uppercase;margin-bottom:36px;">Logo principal</div>
      <div style="display:flex;align-items:center;gap:30px;">
        <dc-import name="AirMessMark" variant="color" hint-size="320px,189px" style="width:320px;height:189px;flex:none;"></dc-import>
        <div style="font-family:'Baloo 2';font-weight:800;font-size:168px;line-height:.8;transform:skewX(-10deg);transform-origin:left center;letter-spacing:-3px;white-space:nowrap;"><span style="color:#FB9A12;">Air</span><span style="color:#E5201F;">Mess</span></div>
      </div>
    </div>

    <!-- Dark + mark -->
    <div style="display:flex;border-bottom:1px solid #EEEBE5;">
      <div style="flex:1;background:#16191B;padding:52px 56px;display:flex;align-items:center;gap:22px;">
        <dc-import name="AirMessMark" variant="color" hint-size="172px,101px" style="width:172px;height:101px;flex:none;"></dc-import>
        <div style="font-family:'Baloo 2';font-weight:800;font-size:92px;line-height:.8;transform:skewX(-10deg);transform-origin:left center;letter-spacing:-2px;white-space:nowrap;"><span style="color:#FB9A12;">Air</span><span style="color:#E5201F;">Mess</span></div>
      </div>
      <div style="width:340px;flex:none;padding:52px 48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-left:1px solid #EEEBE5;">
        <dc-import name="AirMessMark" variant="color" hint-size="220px,130px" style="width:220px;height:130px;"></dc-import>
        <div style="font-size:12px;color:#B6B0A6;font-weight:500;">Symbole seul</div>
      </div>
    </div>

    <!-- App icons -->
    <div style="padding:56px 56px 60px;border-bottom:1px solid #EEEBE5;">
      <div style="font-size:12px;font-weight:600;letter-spacing:1.5px;color:#B6B0A6;text-transform:uppercase;margin-bottom:38px;">Icônes d'application</div>
      <div style="display:flex;gap:56px;align-items:flex-start;">

        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="width:188px;height:188px;border-radius:44px;background:#ffffff;border:1px solid #ECE9E3;box-shadow:0 10px 30px -12px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;">
            <dc-import name="AirMessMark" variant="color" hint-size="124px,73px" style="width:124px;height:73px;"></dc-import>
          </div>
          <div style="font-size:12px;color:#9A958C;font-weight:500;">Fond clair</div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="width:188px;height:188px;border-radius:44px;background:linear-gradient(150deg,#FFB02E 0%,#FA8500 55%,#F26A00 100%);box-shadow:0 10px 30px -10px rgba(242,106,0,.5);display:flex;align-items:center;justify-content:center;">
            <dc-import name="AirMessMark" variant="white" hint-size="128px,76px" style="width:128px;height:76px;"></dc-import>
          </div>
          <div style="font-size:12px;color:#9A958C;font-weight:500;">Dégradé orange</div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="width:188px;height:188px;border-radius:44px;background:#16191B;box-shadow:0 10px 30px -12px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;">
            <dc-import name="AirMessMark" variant="color" hint-size="124px,73px" style="width:124px;height:73px;"></dc-import>
          </div>
          <div style="font-size:12px;color:#9A958C;font-weight:500;">Fond sombre</div>
        </div>

      </div>
    </div>

    <!-- Palette -->
    <div style="padding:52px 56px 60px;">
      <div style="font-size:12px;font-weight:600;letter-spacing:1.5px;color:#B6B0A6;text-transform:uppercase;margin-bottom:34px;">Palette</div>
      <div style="display:flex;gap:20px;">
        <sc-for list="{{ swatches }}" as="sw" hint-placeholder-count="4">
          <div style="flex:1;">
            <div style="height:96px;border-radius:6px;background:{{ sw.css }};box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);"></div>
            <div style="margin-top:12px;font-size:13px;font-weight:600;color:#1A1D1F;">{{ sw.name }}</div>
            <div style="margin-top:3px;font-size:12px;color:#9A958C;font-family:'Inter';letter-spacing:.3px;">{{ sw.hex }}</div>
          </div>
        </sc-for>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1260,&quot;height&quot;:980}}">
class Component extends DCLogic {
  renderVals() {
    return {
      swatches: [
        { name: 'Orange clair', hex: '#FFC22E', css: '#FFC22E' },
        { name: 'Orange', hex: '#FB8B00', css: 'linear-gradient(135deg,#FFC22E,#FB8B00)' },
        { name: 'Rouge', hex: '#E5201F', css: 'linear-gradient(135deg,#EA322E,#D7171D)' },
        { name: 'Encre', hex: '#16191B', css: '#16191B' },
      ],
    };
  }
}
</script>
<script>
(async () => {
  if (!document.title || !document.title.trim()) document.title = "AirMess Logo";
  // Prepend so page-supplied @page / break rules (deck-stage's margin:0,
  // author CSS) keep source-order precedence over the baseline.
  const baseCss = document.createElement('style');
  baseCss.textContent = "@media print {\n  @page { margin: 0.5cm; }\n  figure, table { break-inside: avoid; }\n  *, *::before, *::after {\n    print-color-adjust: exact; -webkit-print-color-adjust: exact;\n    backdrop-filter: none !important; -webkit-backdrop-filter: none !important;\n    animation-delay: -99s !important; animation-duration: .001s !important;\n    animation-iteration-count: 1 !important; animation-fill-mode: both !important;\n    animation-play-state: running !important; transition-duration: 0s !important;\n  }\n}";
  document.head.prepend(baseCss);
  if (document.readyState === 'loading') {
    await new Promise((r) => document.addEventListener('DOMContentLoaded', r, { once: true }));
  }
  let ds = document.querySelector('deck-stage');
  // whenDefined never resolves when nothing registers the element, so only
  // await it when a <deck-stage> tag exists (and race a timeout regardless).
  if (ds && !customElements.get('deck-stage')) {
    try {
      await Promise.race([
        customElements.whenDefined('deck-stage'),
        new Promise((r) => setTimeout(r, 3000)),
      ]);
    } catch (e) {}
    ds = document.querySelector('deck-stage');
  }
  // dc-runtime assigns window.DCLogic at init and mounts into #dc-root on
  // DOMContentLoaded; settle on that subtree so React has rendered before
  // print(). Non-DC pages fall through to weighing body.
  const isDc = !ds && 'DCLogic' in window;
  const settleRoot = ds || (isDc ? document.getElementById('dc-root') : null) || document.body;
  if (settleRoot) {
    // Weigh only content children — skip script/style/template so inline
    // Babel/CSS doesn't register as stable "content" before the framework
    // has mounted anything.
    const MEDIA = 'img,svg,canvas,video,picture,iframe,embed,object';
    const weigh = () => {
      let text = 0, media = 0;
      for (const c of settleRoot.children) {
        const t = c.tagName;
        if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
        text += (c.textContent || '').trim().length;
        media += c.querySelectorAll(MEDIA).length + (c.matches(MEDIA) ? 1 : 0);
      }
      return text + media * 100;
    };
    // "Non-zero and stable" alone is not sufficient to mean rendered: generic
    // body can carry a static shell while async main content is pending, and
    // #dc-root can carry the root DC's static text while child refs are still
    // .sc-placeholder boxes. Gate generic on readyState 'complete', and never
    // accept stability while a dc-runtime placeholder is present.
    const isGeneric = settleRoot === document.body;
    const deadline = Date.now() + 15000;
    let last = -1, stable = 0;
    while (Date.now() < deadline) {
      const n = weigh();
      const ready =
        (!isGeneric || document.readyState === 'complete') &&
        !settleRoot.querySelector('.sc-placeholder');
      if (n > 0 && n === last && ready) { if (++stable >= 2) break; } else { stable = 0; }
      last = n;
      await new Promise((r) => setTimeout(r, 250));
    }
  }
  // Reveal content gated on scroll or visibility before printing. Lazy <img>,
  // IntersectionObserver fade-ins, and collapsed <details> don't render while
  // off-screen, so a long page would print with them blank or closed. Open
  // every <details>, force native-lazy images eager, and scroll the document
  // through its full height to trip lazy-load + IO; then wait (bounded) for the
  // newly-triggered images. Inert for deck-stage (slides aren't scroll-gated).
  try {
    for (const d of document.querySelectorAll('details')) d.open = true;
    for (const img of document.querySelectorAll('img[loading="lazy"]'))
      img.loading = 'eager';
    const scroller = document.scrollingElement || document.documentElement;
    const full = Math.max(scroller.scrollHeight, document.body.scrollHeight);
    const step = window.innerHeight || 800;
    for (let y = 0; y <= full; y += step) {
      window.scrollTo(0, y);
      await new Promise((r) => requestAnimationFrame(r));
    }
    window.scrollTo(0, 0);
    await Promise.race([
      Promise.all(
        [...document.images].map((img) =>
          img.complete
            ? null
            : new Promise((res) => {
                img.addEventListener('load', res, { once: true });
                img.addEventListener('error', res, { once: true });
              })
        )
      ),
      new Promise((r) => setTimeout(r, 4000)),
    ]);
  } catch (e) {}
  try { await document.fonts.ready; } catch (e) {}
  // Jump every animation to its end state so print() never captures a slide
  // mid-entrance. Ordering matters: the 0s-transition style must be live
  // BEFORE data-deck-active is set so attribute-keyed transitions don't
  // start a (now-0s) run from the pre-active base.
  const st = document.createElement('style');
  st.textContent = '*,*::before,*::after{animation-delay:-99s !important;animation-duration:.001s !important;animation-iteration-count:1 !important;animation-fill-mode:both !important;animation-play-state:running !important;transition-duration:0s !important}';
  document.head.appendChild(st);
  for (const d of document.querySelectorAll('deck-stage')) {
    for (const c of d.children) {
      const t = c.tagName;
      if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
      c.setAttribute('data-deck-active', '');
    }
  }
  // Re-append deck-stage's @page last so no author @page can add a margin and
  // spill each full-bleed slide onto two sheets. Backstop for old copies.
  if (ds) {
    let pg = document.getElementById('deck-stage-print-page');
    if (!pg) {
      pg = document.createElement('style');
      pg.textContent = '@page{size:' + (+ds.getAttribute('width') || 1920) +
        'px ' + (+ds.getAttribute('height') || 1080) + 'px;margin:0}';
    }
    document.body.appendChild(pg);
  }
  try {
    const sweep = () => {
      for (const a of document.getAnimations()) {
        try { a.finish(); } catch (e) {
          try { a.currentTime = (a.effect && a.effect.getComputedTiming().duration) || 0; a.pause(); } catch (e2) {}
        }
      }
    };
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
  } catch (e) {}
  // Relax break-inside on oversized elements. An element taller than a
  // printable page can't honor break-inside: avoid — browsers either overflow
  // it or push it whole to the next page, leaving a blank gap, then break it
  // anyway at an arbitrary point. After the final layout (content revealed,
  // animations jumped), find elements taller than a page that still compute
  // break-inside: avoid and reset them to auto, so the browser breaks them at
  // their children's boundaries instead (children keep their own avoid). PAGE_PX
  // is a conservative portrait estimate at 96 CSS px/in — Letter/A4 usable
  // height minus our 0.5in margins — so only clearly-oversized elements are
  // touched and under-page elements still stay whole. Skipped for decks, whose
  // slides are sized to the page.
  try {
    if (!document.querySelector('deck-stage')) {
      const PAGE_PX = 1024;
      // Our print defaults add a body padding inset only when we also zero the
      // @page margin; computed style can't tell us (it reports screen media),
      // so read the injected rule directly.
      const defaults = document.querySelector('style[data-omelette-print-defaults]');
      const pageInset = /body\s*\{[^}]*padding/.test(defaults ? defaults.textContent || '' : '');
      const SEL = 'section,article,figure,table,pre,blockquote,[class~="card" i],[class~="page" i],[class~="sheet" i]';
      for (const el of document.body.querySelectorAll(SEL)) {
        if (el instanceof HTMLElement && el.offsetHeight > PAGE_PX) {
          el.setAttribute('data-om-oversized', '');
          // Fake-paged docs simulate sheets with over-tall break-after:page
          // boxes; honoring the break spills half-blank pages and ends a
          // colored box mid-sheet. Flow them, and (only when we own the page
          // inset) drop the redundant padding/background via the rule below.
          const cs = getComputedStyle(el);
          if (cs.breakAfter === 'page' || cs.pageBreakAfter === 'always') {
            el.setAttribute('data-om-fakepage', '');
          }
        }
      }
      const ost = document.createElement('style');
      ost.textContent = '@media print{' +
        '[data-om-oversized]{break-inside:auto !important;page-break-inside:auto !important}' +
        '[data-om-fakepage]{break-after:auto !important;page-break-after:auto !important}' +
        (pageInset ? '[data-om-fakepage]{padding:0 !important;background:none !important}' : '') +
        '}';
      document.head.appendChild(ost);
    }
  } catch (e) {}
  // macOS Preview renders Skia-PDF Luminosity soft-masks as opaque grey boxes;
  // swap the CSS that triggers them for Preview-safe forms.
  try {
    for (const el of document.body.querySelectorAll('*')) {
      const cs = getComputedStyle(el);

      if (cs.boxShadow !== 'none' && cs.filter === 'none') {
        const outs = [], kept = [];
        for (const s of cs.boxShadow.split(/,(?![^(]*[)])/)) {
          const t = s.trim();
          const m = t.match(/^(rgba?[(][^)]+[)]) (-?[0-9.]+px) (-?[0-9.]+px) ([0-9.]+px) -?[0-9.]+px$/);
          if (m && parseFloat(m[4]) > 0) outs.push('drop-shadow(' + m[2] + ' ' + m[3] + ' ' + m[4] + ' ' + m[1] + ')');
          else kept.push(t);
        }
        if (outs.length) {
          el.style.setProperty('filter', outs.join(' '), 'important');
          el.style.setProperty('box-shadow', kept.join(', ') || 'none', 'important');
        }
      }

      const mask = cs.maskImage && cs.maskImage !== 'none' ? cs.maskImage : cs.webkitMaskImage;
      if (mask && mask !== 'none' && cs.filter === 'none') el.style.setProperty('filter', 'opacity(1)', 'important');
    }
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
</body>
</html>
